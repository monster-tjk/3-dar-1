<!doctype html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-100 font-sans">
    <header class="bg-[#99cc33] text-white px-4 py-3 md:py-4 shadow-md">
      <div class="max-w-[1200px] mx-auto flex items-center justify-between">
        <div class="hidden md:flex items-center justify-between w-full">
          <div class="flex items-center space-x-2">
            <div class="text-2xl"><i class="fa-solid fa-chair"></i></div>
            <div>
              <div
                class="font-black text-lg tracking-wider uppercase leading-none"
              >
                стол плюс
              </div>
              <div
                class="text-[10px] text-gray-100 uppercase tracking-widest leading-none mt-0.5"
              >
                мебельный магазин
              </div>
            </div>
          </div>

          <button
            class="border border-white/50 rounded-xl px-5 py-2 flex items-center space-x-2 hover:bg-white/10 transition text-sm font-medium"
          >
            <i class="fa-solid fa-bars"></i>
            <span>Каталог</span>
          </button>

          <nav
            class="flex items-center space-x-6 text-sm text-gray-100 font-normal"
          >
            <p>Доставка</p>
            <p>Способы оплаты</p>
            <p>Контакты</p>
            <p>Гарантия и возврат</p>
            <p>Политика конфиденциальности</p>
          </nav>

          <p class="flex items-center space-x-2 text-sm">
            <i class="fa-solid fa-basket-shopping text-lg"></i>
            <span>Корзина</span>
          </p>
        </div>

        <div class="flex md:hidden items-center justify-between w-full">
          <button
            class="border border-white/50 rounded-xl px-3 py-1.5 flex items-center text-xs font-medium"
          >
            <span>Каталог</span>
          </button>

          <div class="flex items-center space-x-1.5 mx-2">
            <div class="text-lg"><i class="fa-solid fa-chair"></i></div>
            <div class="text-center">
              <div
                class="font-black text-sm tracking-wider uppercase leading-none"
              >
                стол плюс
              </div>
              <div
                class="text-[7px] text-gray-100 uppercase tracking-widest leading-none mt-0.5"
              >
                мебельный магазин
              </div>
            </div>
          </div>

          <div class="flex items-center space-x-4 text-lg">
            <button><i class="fa-solid fa-bars"></i></button>
            <p><i class="fa-solid fa-basket-shopping"></i></p>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
